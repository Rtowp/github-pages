      <!-- CSS Khusus untuk Fitur Horizontal Scroll & Navigasi Platform -->
      <style>
        /* Navigasi Pilihan Platform */
        .platform-nav {
          display: flex;
          gap: 10px;
          margin-bottom: 20px;
          border-bottom: 1px solid rgba(255, 255, 255, 0.1);
          padding-bottom: 10px;
        }
        .platform-btn {
          background: rgba(255, 255, 255, 0.05);
          color: #fff;
          border: 1px solid rgba(255, 255, 255, 0.1);
          padding: 8px 16px;
          border-radius: 4px;
          cursor: pointer;
          font-family: var(--font-mono, monospace);
          font-size: 0.85rem;
          transition: all 0.3s ease;
        }
        .platform-btn.active, .platform-btn:hover {
          background: #FCA311;
          color: #0D1B2A;
          border-color: #FCA311;
        }

        /* Container Utama untuk Horizontal Scroll */
        .horizontal-scroll-container {
          display: flex;
          gap: 20px;
          overflow-x: auto;
          scroll-snap-type: x mandatory;
          padding-bottom: 15px;
          scrollbar-width: thin; /* Untuk Firefox */
          scrollbar-color: #FCA311 rgba(255, 255, 255, 0.05);
        }

        /* Modifikasi Scrollbar untuk Chrome, Safari, dan Edge */
        .horizontal-scroll-container::-webkit-scrollbar {
          height: 6px;
        }
        .horizontal-scroll-container::-webkit-scrollbar-track {
          background: rgba(255, 255, 255, 0.05);
          border-radius: 4px;
        }
        .horizontal-scroll-container::-webkit-scrollbar-thumb {
          background: #FCA311;
          border-radius: 4px;
        }

        /* Setiap Kolom Platform di dalam Scroll */
        .platform-card-column {
          flex: 0 0 300px; /* Lebar tetap per kategori saat di-scroll */
          scroll-snap-align: start;
          background: rgba(255, 255, 255, 0.02);
          border: 1px solid rgba(255, 255, 255, 0.05);
          padding: 20px;
          border-radius: 6px;
        }
        @media (min-width: 768px) {
          .platform-card-column {
            flex: 0 0 360px; /* Sedikit lebih lebar di desktop */
          }
        }

        .platform-card-column h4 {
          margin-top: 0;
          margin-bottom: 15px;
          font-size: 1.1rem;
          color: #FCA311;
          border-left: 3px solid #FCA311;
          padding-left: 10px;
        }

        /* Layout Grid Mini di dalam Kolom */
        .mini-thumb-grid {
          display: grid;
          grid-template-columns: repeat(2, 1fr);
          gap: 10px;
          margin-bottom: 15px;
        }
        .mini-thumb-grid a {
          display: block;
          overflow: hidden;
          border-radius: 4px;
        }
        .mini-thumb-grid a img {
          width: 100%;
          height: auto;
          display: block;
          transition: transform 0.3s ease;
        }
        .mini-thumb-grid a:hover img {
          transform: scale(1.05);
        }

        /* Penyesuaian Leaderboard Teks */
        .scroll-leaderboard {
          list-style: none;
          padding: 0;
          margin: 0;
        }
        .scroll-leaderboard li {
          margin-bottom: 8px;
          font-size: 0.9rem;
          border-bottom: 1px solid rgba(255, 255, 255, 0.05);
          padding-bottom: 6px;
        }
        .scroll-leaderboard li a {
          display: flex;
          justify-content: space-between;
          text-decoration: none;
          color: inherit;
          transition: opacity 0.2s ease;
        }
        .scroll-leaderboard li a:hover {
          opacity: 0.7;
        }
      </style>
